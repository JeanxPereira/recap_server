name: Build (Windows x64)

on:
  push:
    branches:
      - master
      - merge/dalkon_2
  pull_request:
    branches:
      - master

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest
    name: Build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set Boost install path
        id: set-boost-path
        run: echo "BOOST_INSTALL_DIR=${{ github.workspace }}/boost" >> $GITHUB_ENV

      - name: Boost - Build
        uses: MarkusJx/install-boost@v2.4.1
        id: install-boost
        with:
          boost_version: 1.73.0
          boost_install_dir: ${{ env.BOOST_INSTALL_DIR }}
          platform_version: 2019

      - name: Debug Boost directory
        run: echo "Boost installed in: ${{ env.BOOST_INSTALL_DIR }}"
        
      - name: Boost - Install
        run: |
          $sourcePath = "${{ env.BOOST_INSTALL_DIR }}\boost"
          $destinationPath = "${{ github.workspace }}\recap_server\darkspore_server\libs\boost_1_73_0"
          if (Test-Path $sourcePath) {
            Move-Item -Path $sourcePath -Destination $destinationPath -Force
            echo "Boost successfully moved."
          } else {
            echo "Boost directory not found: $sourcePath"
            exit 1
          }
    
      - name: Install MSBuild
        uses: microsoft/setup-msbuild@v1.0.2
        with:
          vs-version: '16.0' # Visual Studio 2019

      - name: Run MSBuild
        id: run_msbuild
        working-directory: ${{ github.workspace }}
        run: msbuild .\darkspore_server.sln /p:Configuration=Release /p:Platform=x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: recap-server-windows-x64
          path: ${{ github.workspace }}/recap_server/darkspore_server/build
