name: Build (Windows x64)

on:
  push:
    branches:
      - master
      - merge/dalkon_2
  pull_request:
    branches:
      - master

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest
    name: Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Instalar o Python e o gdown para baixar arquivos do Google Drive
      - name: Set up Python for gdown
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install gdown
        run: |
          pip install gdown

      # Baixar o arquivo ZIP do Boost pré-compilado usando gdown
      - name: Download Boost 1.73.0 precompiled from Google Drive
        run: |
          gdown --id 1PoiQ581vgl3iGp5xw6DDJWP6ZI1Xkgp7 -O boost_1_73_0.zip

      # Descompactar o arquivo ZIP do Boost
      - name: Unzip Boost 1.73.0
        run: |
          7z x boost_1_73_0.zip -o${{ runner.workspace }}\darkspore_server\libs\
        shell: cmd

      # Verificar a estrutura de diretórios do Boost após a descompactação
      - name: List Boost directories
        run: |
          dir ${{ runner.workspace }}\darkspore_server\libs\boost_1_73_0


      # Definir variáveis de ambiente para o Boost
      - name: Set environment variables for Boost
        run: |
          echo "BOOST_ROOT=${{ runner.workspace }}\darkspore_server\libs\boost_1_73_0" >> $GITHUB_ENV
          echo "BOOST_LIBRARYDIR=${{ runner.workspace }}\darkspore_server\libs\boost_1_73_0\stage\lib" >> $GITHUB_ENV
          echo "INCLUDE_PATH=${{ runner.workspace }}\darkspore_server\libs\boost_1_73_0\boost;${{ runner.workspace }}\darkspore_server\source;${{ runner.workspace }}\darkspore_server\libs\rapidjson-1.1.0\include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=${{ runner.workspace }}\darkspore_server\libs\boost_1_73_0\lib" >> $GITHUB_ENV
        shell: bash

      # Definir corretamente as variáveis INCLUDE e LIB para o MSBuild
      - name: Set INCLUDE and LIB for MSBuild
        run: |
          echo "INCLUDE=${{ runner.workspace }}\darkspore_server\source;
          ${{ runner.workspace }}\darkspore_server\libs\boost_1_73_0;
          ${{ runner.workspace }}\darkspore_server\libs\boost_1_73_0\boost;
          ${{ runner.workspace }}\darkspore_server\libs\rapidjson-1.1.0\include;$INCLUDE" >> $GITHUB_ENV
          echo "LIB=${{ runner.workspace }}\darkspore_server\libs\boost_1_73_0\stage\lib;$LIB" >> $GITHUB_ENV

      # Setup do ambiente MSVC
      - name: Set up MSVC environment
        uses: seanmiddleditch/gha-setup-vsdevenv@v4
        with:
          arch: amd64
          components: Microsoft.VisualStudio.Component.VC.Tools.x86.x64;Microsoft.VisualStudio.Component.Windows10SDK.19041;Microsoft.VisualStudio.Component.VC.CMake.Project
          toolset_version: 14.2  # Especifica o uso do MSVC 14.2

      # Instalar MSBuild
      - name: Install MSBuild
        uses: microsoft/setup-msbuild@v1

      # Verificar variáveis de ambiente
      - name: Debug Environment Variables
        run: |
          echo "INCLUDE_PATH=${{ env.INCLUDE_PATH }}"
          echo "LIBRARY_PATH=${{ env.LIBRARY_PATH }}"

      # Verificar se o Boost foi descompactado corretamente
      - name: List Boost headers
        run: |
          dir ${{ runner.workspace }}\darkspore_server\libs\boost_1_73_0\boost

      # Rodar a compilação do projeto com MSBuild
      - name: Run MSBuild
        working-directory: ${{ github.workspace }}
        run: |
          msbuild .\darkspore_server.sln /p:Configuration=Release /p:Platform=x64 /fileLogger /fileLoggerParameters:LogFile=msbuild.log

      # Fazer upload dos logs do MSBuild
      - name: Upload MSBuild Logs
        uses: actions/upload-artifact@v3
        with:
          name: msbuild-logs
          path: msbuild.log

      # Fazer upload dos artefatos de compilação
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: recap-server-windows-x64
          path: ${{ runner.workspace }}\darkspore_server\build
