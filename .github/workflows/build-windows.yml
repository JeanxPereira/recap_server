name: Build (Windows x64)

on:
  push:
    branches:
      - master
      - merge/dalkon_2
  pull_request:
    branches:
      - master

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest
    name: Build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set Boost temporary path
        id: set-boost-path
        run: echo "BOOST_INSTALL_DIR=${{ runner.temp }}/boost_tmp" >> $GITHUB_ENV
        
      - name: Verify Boost temporary path
        id: verify-boost-path
        run: |
          echo "Boost installation directory is ${{ env.BOOST_INSTALL_DIR }}"
          tree /f "${{ env.BOOST_INSTALL_DIR }}"

      - name: Boost - Build
        uses: MarkusJx/install-boost@v2.4.1
        id: install-boost
        with:
          boost_version: 1.73.0
          boost_install_dir: ${{ env.BOOST_INSTALL_DIR }}
          platform_version: 2019

      - name: Boost - Install
        run: |
          mv "${{ env.BOOST_INSTALL_DIR }}\boost" "${{ github.workspace }}\recap_server\darkspore_server\libs\boost_1_73_0"

      - name: Install MSBuild
        uses: microsoft/setup-msbuild@v1.0.2
        with:
          vs-version: '16.0' # Visual Studio 2019

      - name: Run MSBuild
        id: run_msbuild
        working-directory: ${{ github.workspace }}
        run: msbuild .\darkspore_server.sln /p:Configuration=Release /p:Platform=x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: recap-server-windows-x64
          path: ${{ github.workspace }}/recap_server/darkspore_server/build
