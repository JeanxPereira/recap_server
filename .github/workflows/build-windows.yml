name: Build (Windows x64)

on:
  push:
    branches:
      - master
      - merge/dalkon_2
  pull_request:
    branches:
      - master

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest
    name: Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install OpenSSL
        run: |
          choco install openssl.light -y

      - name: Set OpenSSL environment variables
        shell: pwsh
        run: |
          echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL-Win64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "OPENSSL_INCLUDE_DIR=C:\Program Files\OpenSSL-Win64\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "OPENSSL_LIB_DIR=C:\Program Files\OpenSSL-Win64\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download Boost 1.73.0
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://boostorg.jfrog.io/artifactory/main/release/1.73.0/source/boost_1_73_0.zip -OutFile boost_1_73_0.zip
          Expand-Archive -Path boost_1_73_0.zip -DestinationPath "${{ github.workspace }}\recap_server\darkspore_server\libs"

      - name: Build Boost Libraries
        shell: cmd
        working-directory: ${{ github.workspace }}\recap_server\darkspore_server\libs\boost_1_73_0
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          bootstrap.bat
          .\b2.exe --with-system --with-thread variant=release link=shared threading=multi runtime-link=shared address-model=64

      - name: Install MSBuild
        uses: microsoft/setup-msbuild@v1.0.2

      - name: Build the Project
        shell: cmd
        working-directory: ${{ github.workspace }}
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          msbuild .\darkspore_server.sln /p:Configuration=Release /p:Platform=x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: recap-server-windows-x64
          path: ${{ github.workspace }}\recap_server\darkspore_server\build
