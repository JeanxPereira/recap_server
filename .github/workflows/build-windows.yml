name: Build (Windows x64)

on:
  push:
    branches:
      - master
      - merge/dalkon_2
  pull_request:
    branches:
      - master

env:
  BUILD_TYPE: Release
  BOOST_VERSION: '1.81.0'

jobs:
  build:
    runs-on: windows-latest
    name: Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Configurar versão do Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar OpenSSL
        run: |
          choco install openssl.light -y

      - name: Definir variáveis de ambiente do OpenSSL
        shell: powershell
        run: |
          $env:OPENSSL_ROOT_DIR = 'C:\Program Files\OpenSSL-Win64'
          $env:OPENSSL_INCLUDE_DIR = 'C:\Program Files\OpenSSL-Win64\include'
          $env:OPENSSL_LIB_DIR = 'C:\Program Files\OpenSSL-Win64\lib'

      - name: Instalar Strawberry Perl
        run: choco install strawberryperl -y

      - name: Baixar e Extrair Boost
        shell: powershell
        run: |
          # Definir a versão do Boost
          $boostVersion = '1.81.0'
          $boostVersionUnderscore = $boostVersion -replace '\.', '_'

          # Definir a URL para o arquivo zip do Boost
          $boostUrl = "https://boostorg.jfrog.io/artifactory/main/release/$boostVersion/source/boost_$boostVersionUnderscore.zip"

          # Caminho para a pasta 'libs'
          $libsPath = "$env:GITHUB_WORKSPACE\libs"

          # Criar o diretório 'libs' se não existir
          if (!(Test-Path -Path $libsPath)) {
            New-Item -ItemType Directory -Path $libsPath
          }

          # Baixar o Boost
          Invoke-WebRequest -Uri $boostUrl -OutFile boost.zip

          # Extrair o Boost para o diretório 'libs'
          Expand-Archive -Path boost.zip -DestinationPath $libsPath

          # Remover o arquivo zip para economizar espaço
          Remove-Item boost.zip

      - name: Verificar Diretório Boost
        shell: powershell
        run: |
          Get-ChildItem "$env:GITHUB_WORKSPACE\libs"

      - name: Restaurar Cache do Boost
        id: boost-cache
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}\libs\boost_1_81_0\stage\lib
            ${{ github.workspace }}\libs\boost_1_81_0\bin.v2
          key: boost-${{ runner.os }}-${{ env.BOOST_VERSION }}-Release

      - name: Instalar MSBuild
        uses: microsoft/setup-msbuild@v1.0.2

      - name: Construir Bibliotecas Boost
        if: steps.boost-cache.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          set BOOST_ROOT=${{ github.workspace }}\libs\boost_1_81_0
          set BOOST_INCLUDEDIR=%BOOST_ROOT%
          set BOOST_LIBRARYDIR=%BOOST_ROOT%\stage\lib
      
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set InstallDir=%%i
          call "%InstallDir%\VC\Auxiliary\Build\vcvars64.bat"
          cd %BOOST_ROOT%
          bootstrap.bat
          if %ERRORLEVEL% neq 0 (
            type bootstrap.log
            exit /b %ERRORLEVEL%
          )
          .\b2.exe -j4 -d2 --with-system --with-thread variant=release link=shared threading=multi runtime-link=shared address-model=64


      - name: Exibir bootstrap.log em caso de falha
        if: failure()
        run: type ${{ github.workspace }}\libs\boost_1_81_0\bootstrap.log

      - name: Listar Conteúdo do Diretório de Trabalho
        run: dir ${{ github.workspace }}

      - name: Executar MSBuild
        run: |
          set BOOST_ROOT=${{ github.workspace }}\libs\boost_1_81_0
          set BOOST_INCLUDEDIR=%BOOST_ROOT%
          set BOOST_LIBRARYDIR=%BOOST_ROOT%\stage\lib
          msbuild darkspore_server.sln ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:IncludePath="%BOOST_INCLUDEDIR%;%INCLUDE%" ^
            /p:LibraryPath="%BOOST_LIBRARYDIR%;%LIB%"

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: recap-server-windows-x64
          path: ${{ github.workspace }}\build
