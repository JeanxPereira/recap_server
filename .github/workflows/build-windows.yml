name: Build (Windows x64)

on:
  push:
    branches:
      - master
      - merge/dalkon_2
  pull_request:
    branches:
      - master

env:
  BUILD_TYPE: Release
  BOOST_VERSION: '1.81.0'

jobs:
  build:
    runs-on: windows-latest
    name: Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Configurar versão do Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar OpenSSL
        run: |
          choco install openssl.light -y

      - name: Definir variáveis de ambiente do OpenSSL
        shell: powershell
        run: |
          $env:OPENSSL_ROOT_DIR = 'C:\Program Files\OpenSSL-Win64'
          $env:OPENSSL_INCLUDE_DIR = 'C:\Program Files\OpenSSL-Win64\include'
          $env:OPENSSL_LIB_DIR = 'C:\Program Files\OpenSSL-Win64\lib'

      - name: Instalar Strawberry Perl
        run: choco install strawberryperl -y

      - name: Instalar gdown
        run: pip install gdown

      - name: Restaurar Cache do Boost Pré-compilado
        id: boost-cache
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}\libs\boost_1_81_0
          key: boost-precompiled-${{ runner.os }}-${{ env.BOOST_VERSION }}-Release
      
      - name: Baixar Boost Pré-compilado
        if: steps.boost-cache.outputs.cache-hit != 'true'
        run: |
          gdown --id 1PoiQ581vgl3iGp5xw6DDJWP6ZI1Xkgp7 -O boost_precompiled.zip
      
      - name: Extrair Boost Pré-compilado
        if: steps.boost-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Expand-Archive -Path boost_precompiled.zip -DestinationPath $env:GITHUB_WORKSPACE\libs
          Remove-Item boost_precompiled.zip
      
      - name: Definir Variáveis de Ambiente do Boost
        shell: cmd
        run: |
          set BOOST_ROOT=%GITHUB_WORKSPACE%\libs\boost_1_81_0
          set BOOST_INCLUDEDIR=%BOOST_ROOT%\include
          set BOOST_LIBRARYDIR=%BOOST_ROOT%\lib
      
      - name: Verificar Diretório Boost
        shell: powershell
        run: |
          Get-ChildItem "$env:BOOST_ROOT"
      
      - name: Instalar MSBuild
        uses: microsoft/setup-msbuild@v1.0.2
      
      - name: Executar MSBuild
        shell: cmd
        run: |
          set BOOST_ROOT=%GITHUB_WORKSPACE%\libs\boost_1_81_0
          set BOOST_INCLUDEDIR=%BOOST_ROOT%\include
          set BOOST_LIBRARYDIR=%BOOST_ROOT%\lib
          msbuild darkspore_server.sln ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /p:IncludePath="%BOOST_INCLUDEDIR%;%INCLUDE%" ^
            /p:LibraryPath="%BOOST_LIBRARYDIR%;%LIB%"

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: recap-server-windows-x64
          path: ${{ github.workspace }}\build
